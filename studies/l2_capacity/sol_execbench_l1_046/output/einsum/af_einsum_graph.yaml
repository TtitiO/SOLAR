workload:
  rank_sizes:
    R0: 1
    R1: 32
    R2: 4096
    R3: 4096
  bits_per_value:
    All: 16
  persistent_tensors: weight - Intermediates
  einsums:
  - name: start
    tensor_accesses:
    - name: start_in
      projection: &id001
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: start
      projection: *id001
      output: true
      bits_per_value: 16
    renames:
      input: Inputs()
      output: Outputs()
      weight: Nothing()
    is_copy_operation: true
  - name: Model_div
    tensor_accesses:
    - name: start
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_div
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 16
    renames:
      input: start
      output: Model_div
      weight: Nothing()
  - name: Model_tanh
    tensor_accesses:
    - name: Model_div
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_tanh
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 16
    renames:
      input: Model_div
      output: Model_tanh
      weight: Nothing()
  - name: Model_mul
    tensor_accesses:
    - name: Model_tanh
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_mul
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 16
    renames:
      input: Model_tanh
      output: Model_mul
      weight: Nothing()
  - name: Model_softmax
    tensor_accesses:
    - name: Model_mul
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_softmax
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 16
    renames:
      input: Model_mul
      output: Model_softmax
      weight: Nothing()
  - name: Model_to
    tensor_accesses:
    - name: Model_softmax
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_to
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 16
    renames:
      input: Model_softmax
      output: Model_to
      weight: Nothing()
renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

    einsum_equation: ->A0B0C0
    elementwise_op: copy
    reduction_op: none
    is_real_einsum: false
    is_einsum_supportable: false
    tensor_names:
      inputs: []
      outputs:
      - start.Output
    tensor_types:
      inputs: []
      outputs:
      - input
    tensor_shapes:
      inputs: []
      outputs:
      - - 128
        - 512
        - 768
    operands:
      start:
      - A0
      - B0
      - C0
    connections:
      inputs: []
      outputs:
      - Model.linear
    tensor_dtypes:
      inputs: []
      outputs:
      - torch.float32
  Model.linear:
    type: linear
    einsum_equation: B0B1K,NK->B0B1N
    elementwise_op: mul
    reduction_op: add
    is_real_einsum: true
    is_einsum_supportable: true
    operands:
      Input:
      - B0
      - B1
      - K
      Weight:
      - N
      - K
      Output:
      - B0
      - B1
      - N
    tensor_names:
      inputs:
      - start.Output
      - Model.parameter-tensor.Output
      outputs:
      - Model.linear.Output
    tensor_types:
      inputs:
      - input
      - weight
      outputs:
      - output
    tensor_shapes:
      inputs:
      - - 128
        - 512
        - 768
      - - 2304
        - 768
      outputs:
      - - 128
        - 512
        - 2304
    tensor_dtypes:
      inputs:
      - torch.float32
      - torch.float32
      outputs:
      - torch.float32
    connections:
      inputs:
      - start
      - Model.parameter-tensor
      outputs:
      - Model.linear.bias_add
    additional_info:
      weights:
      - name: Weight
        shape:
        - 2304
        - 768
    taco_expression: O0[b0,b1,n] = In0[b0,b1,k] * In1[n,k]
  Model.linear.bias_add:
    type: add
    einsum_equation: ABC,C->ABC

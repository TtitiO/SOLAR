workload:
  rank_sizes:
    R0: 1
    R1: 20
    R2: 2048
    R3: 2048
    R4: 64
    R5: 1280
  bits_per_value:
    All: 16
  persistent_tensors: weight - Intermediates
  einsums:
  - name: start
    tensor_accesses:
    - name: start_in
      projection: &id001
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: start
      projection: *id001
      output: true
      bits_per_value: 16
    renames:
      input: Inputs()
      output: Outputs()
      weight: Nothing()
    is_copy_operation: true
  - name: start_1
    tensor_accesses:
    - name: start_1_in
      projection: &id002
      - r0
      - r1
      - r3
      - r4
      bits_per_value: 16
    - name: start_1
      projection: *id002
      output: true
      bits_per_value: 16
    renames:
      input: Inputs()
      output: Outputs()
      weight: Nothing()
    is_copy_operation: true
  - name: Model_matmul
    tensor_accesses:
    - name: start
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: start_1
      projection:
      - r0
      - r1
      - r3
      - r4
      bits_per_value: 16
    - name: Model_matmul
      projection:
      - r0
      - r1
      - r2
      - r4
      output: true
      bits_per_value: 16
    renames:
      input: start
      output: Model_matmul
      weight: start_1
  - name: Model_reshape
    tensor_accesses:
    - name: Model_matmul
      projection:
      - r0
      - r1
      - r2
      - r4
      bits_per_value: 16
    - name: Model_reshape
      projection:
      - r0
      - r2
      - r5
      output: true
      bits_per_value: 16
    renames:
      input: Model_matmul
      output: Model_reshape
      weight: Nothing()
renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

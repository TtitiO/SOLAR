workload:
  rank_sizes:
    R0: 8
    R1: 256
    R2: 128
    R3: 128
    R4: 256
    R5: 3
    R6: 3
    R7: 128
    R8: 128
    R9: 3
    R10: 3
  bits_per_value:
    All: 32
  persistent_tensors: weight - Intermediates
  einsums:
  - name: start
    tensor_accesses:
    - name: start_in
      projection: &id001
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: start
      projection: *id001
      output: true
      bits_per_value: 16
    renames:
      input: Inputs()
      output: Outputs()
      weight: Nothing()
    is_copy_operation: true
  - name: Model_conv2d
    tensor_accesses:
    - name: start
      projection:
        R0: r0
        R1: r1
        R2: r7+r5
        R3: r8+r6
      bits_per_value: 16
    - name: W1
      projection:
      - r4
      - r1
      - r5
      - r6
      bits_per_value: 32
    - name: Model_conv2d
      projection:
      - r0
      - r4
      - r7
      - r8
      output: true
      bits_per_value: 32
    renames:
      input: start
      output: Model_conv2d
      weight: W1
  - name: Model_group_norm
    tensor_accesses:
    - name: Model_conv2d
      projection:
      - r0
      - r4
      - r7
      - r8
      bits_per_value: 32
    - name: Model_group_norm
      projection:
      - r0
      - r4
      - r7
      - r8
      output: true
      bits_per_value: 32
    renames:
      input: Model_conv2d
      output: Model_group_norm
      weight: Nothing()
  - name: Model_silu
    tensor_accesses:
    - name: Model_group_norm
      projection:
      - r0
      - r4
      - r7
      - r8
      bits_per_value: 32
    - name: Model_silu
      projection:
      - r0
      - r4
      - r7
      - r8
      output: true
      bits_per_value: 32
    renames:
      input: Model_group_norm
      output: Model_silu
      weight: Nothing()
  - name: Model_conv2d_1
    tensor_accesses:
    - name: Model_silu
      projection:
        R0: r0
        R4: r4
        R7: r2+r9
        R8: r3+r10
      bits_per_value: 32
    - name: W2
      projection:
      - r1
      - r4
      - r9
      - r10
      bits_per_value: 32
    - name: Model_conv2d_1
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 32
    renames:
      input: Model_silu
      output: Model_conv2d_1
      weight: W2
  - name: Model_group_norm_1
    tensor_accesses:
    - name: Model_conv2d_1
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 32
    - name: Model_group_norm_1
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 32
    renames:
      input: Model_conv2d_1
      output: Model_group_norm_1
      weight: Nothing()
  - name: Model_silu_1
    tensor_accesses:
    - name: Model_group_norm_1
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 32
    - name: Model_silu_1
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 32
    renames:
      input: Model_group_norm_1
      output: Model_silu_1
      weight: Nothing()
  - name: Model_add
    tensor_accesses:
    - name: Model_silu_1
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 32
    - name: start
      projection:
      - r0
      - r1
      - r2
      - r3
      bits_per_value: 16
    - name: Model_add
      projection:
      - r0
      - r1
      - r2
      - r3
      output: true
      bits_per_value: 32
    renames:
      input: Model_silu_1
      output: Model_add
      weight: start
renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1
